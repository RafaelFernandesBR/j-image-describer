name: Build Jieshu Extension

on:
  push:
    tags: ["*"]
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Package extension
        run: |
          cd ${{ github.workspace }}
          zip -j image-describer.ppk *.lua
          ls -lh image-describer.ppk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-describer
          path: image-describer.ppk

  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: build

    steps:
      - uses: actions/checkout@v3

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: image-describer

      - name: Rename to PPK
        run: mv image-describer.ppk image-describer-${{ github.ref_name }}.ppk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: image-describer-*.ppk
          fail_on_unmatched_files: false

